<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>投票頁面 - MY PICK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black">

    <div class="app-container vh-100 d-flex flex-column position-relative overflow-hidden">
        
        <div class="d-flex justify-content-between align-items-center py-3 px-3 position-relative">
            
            <a href="javascript:history.back()" class="game-btn-nav text-decoration-none" style="z-index: 2;">
                <span class="fw-bold me-1">◀</span> BACK
            </a>
            
            <div class="position-absolute w-100 text-center start-0 text-white fs-5 fw-bold" style="z-index: 1; pointer-events: none; letter-spacing: 2px;">
                投票
            </div>
            
            <button type="button" id="openRuleBtn" class="game-btn-nav" style="z-index: 2;" data-bs-toggle="modal" data-bs-target="#voteRuleModal">
                RULE <span class="fw-bold ms-1">?</span>
            </button>
            
        </div>

        <!-- <div class="d-flex px-4 mb-3 gap-4">
            <div class="tab-item active">個人投票</div>
            <div class="tab-item">MY PICK</div>
        </div> -->

        <div class="custom-dark-bg flex-grow-1 overflow-auto custom-scrollbar px-3 pt-4 pb-5">

            <div id="notOpenContainer" class="text-center d-none pt-5 px-3">
                <div class="fs-1 mb-3">⏳</div> 
                <h3 class="text-white fw-bold mb-3">目前非投票開放時間</h3>
                <p class="text-white-50 mb-4" id="voteTimeMessage">
                    請留意官方公告，下一輪投票即將展開，敬請期待！
                </p>
                <a href="index.html" class="btn btn-outline-light rounded-pill px-4">回首頁</a>
            </div>

            <div id="alreadyVotedContainer" class="text-center d-none pt-5 px-3">
                <img src="images/stop.png" alt="已投票" class="img-fluid mb-4" style="max-width: 90%;">
                
                <h3 class="text-white fw-bold mb-3">您已完成本輪投票！</h3>
                <p class="text-white-50 mb-4">
                    每人每輪限投一次，感謝您的熱情參與！<br>
                    快去查看或下載您的專屬認證照吧 ✨
                </p>
                
                <a href="page4.html" class="btn btn-light rounded-pill py-2 px-4 fw-bold shadow">
                    查看我的證書
                </a>
            </div>
            
            <div class="row g-4 text-center" id="candidate-list"></div>
            
            <div style="height: 100px;"></div>
        </div>

        <div class="sticky-bottom-wrapper">
            <button type="button" class="btn custom-btn-blue w-100 d-flex flex-column align-items-center justify-content-center pt-3 pb-4 bottom-action-btn">
                <span class="fw-bold fs-5">確認PICK的練習生</span>
                <span class="small opacity-75 mt-1" style="font-size: 0.8rem;">請跳轉至下一頁完成投票</span>
            </button>
        </div>

    </div>

    <div id="modal-container"></div>

    <div class="modal fade" id="confirmVoteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered px-3">
        <div class="modal-content custom-modal-bg border-0">
            <div class="modal-body text-center p-4 p-sm-5">
                
                <h3 class="text-white fw-bold mb-3">確認投票</h3>
                <p class="text-white-50 fs-6 mb-4">
                    確定要將您神聖的一票投給<br>
                    <span id="confirmCandidateName" class="text-primary fw-bold fs-2 mt-2 d-block"></span>
                </p>

                <div class="d-flex gap-3 mt-4">
                    <button type="button" class="btn w-50 custom-btn-cancel fw-bold py-3 rounded-pill" data-bs-dismiss="modal">
                        讓我想想
                    </button>
                    <button type="button" id="finalConfirmBtn" class="btn w-50 custom-btn-blue fw-bold py-3 rounded-pill">
                        確認
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="page3.js"></script>
</body>
</html>
