<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produce KPI - 投票與影片</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white vh-100">

    <main class="app-container d-flex flex-column w-100 h-100">
        
        <div class="p-3">
            <a href="#" class="voting-banner d-block text-decoration-none p-4 rounded-4 position-relative">
                <h5 class="fw-bold mb-3 text-dark">請投票給你PICK的練習生</h5>
                <div class="d-inline-block event-badge rounded-pill px-2 py-1 mb-2 fw-bold">Event</div>
                <p class="mb-0 fw-bold text-white">Produce KPI第一輪<br>投票活動進行中！</p>
            </a>
        </div>

        <div class="video-list flex-grow-1 overflow-auto">
            
            <div class="video-item d-flex flex-column p-3 border-bottom border-secondary">
                <div class="fw-bold mb-2">Produce KPI EP.1 Countdown</div>
                <div class="video-thumbnail rounded-2"></div>
            </div>

            <div class="video-item d-flex flex-column p-3 border-bottom border-secondary">
                <div class="fw-bold mb-2">Produce KPI 主題曲舞台</div>
                <div class="video-thumbnail rounded-2"></div>
            </div>

            <div class="video-item d-flex flex-column p-3 border-bottom border-secondary">
                <div class="fw-bold mb-2">Produce KPI EP.1 預告</div>
                <div class="video-thumbnail rounded-2"></div>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
