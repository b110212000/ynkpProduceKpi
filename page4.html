<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>投票證書</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-light">

    <div class="app-container vh-100 d-flex flex-column position-relative overflow-auto pb-5">
        
        <div class="px-4">
            <div id="certificateCard" class="cert-card p-4 mx-auto text-center position-relative overflow-hidden">
                
                <h4 class="fw-bold mt-2 mb-1" style="letter-spacing: 2px;">投票證書</h4>
                <p class="text-danger small fw-bold mb-4">✔️ 1輪, 投票認證書</p>

                <div id="certImg" class="cert-avatar mx-auto mb-3 shadow-sm"></div>

                <p class="small text-muted mb-1">Final Global 1st Vote</p>
                <h3 id="certName" class="fw-bold mb-4"></h3>

                <div class="d-flex justify-content-between align-items-center border-top border-secondary pt-3 mt-2">
                    <span class="small text-muted">參與日期</span>
                    <span id="certDate" class="fw-bold small px-2 py-1 rounded" style="background: rgba(255,255,255,0.6);"></span>
                </div>

                <div class="text-start mt-3">
                    <p class="small text-muted mb-0" style="font-size: 0.7rem;">本認證書由 Produce KPI 官方頒發。</p>
                    <p class="small text-muted mb-0" style="font-size: 0.6rem; opacity: 0.7;">No. M-UxIuOeBztKF5g8l9YzPhq1</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-5 px-4">
            
            <div id="resultContainer" class="text-center d-none mb-4">
                <div class="alert alert-primary fw-bold py-2 px-1" role="alert" style="font-size: 0.9rem;">
                    ✨ 證書產生成功！ ✨ <br>
                    請都「長按下方圖片」儲存到相簿
                </div>
                <img id="finalGeneratedImg" class="img-fluid shadow-lg rounded-4 border border-secondary" src="" alt="您的證書">
            </div>
            <button id="downloadBtn" class="btn btn-light rounded-pill px-4 py-2 shadow-sm fw-bold border border-secondary mb-3">
                <span class="fs-5 me-2">✨</span> 生成我的證書
            </button>

            <p class="text-danger fw-bold" style="font-family: 'Brush Script MT', 'DFKai-SB', 'BiauKai'; transform: rotate(-2deg);">
                提示文字：掰掰就掰掰，所以記得存
            </p>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script>
        $(document).ready(function() {
            
            // 1. 從 sessionStorage 拿出剛才存的資料
            let pickName = sessionStorage.getItem('myPickName');
            let pickImg = sessionStorage.getItem('myPickImg');

            // 如果沒抓到資料(可能使用者是直接輸入網址進來的)，就退回投票頁
            if(!pickName || !pickImg) {
                alert("找不到投票紀錄，將為您導回首頁！");
                window.location.href = "voting.html";
                return;
            }

            // 2. 把資料塞進證書的 HTML 裡
            $('#certName').text(pickName);
            $('#certImg').css('background-image', 'url(' + pickImg + ')');

            // 3. 產生現在的日期與時間 (格式：YYYY.MM.DD HH:mm)
            let now = new Date();
            let dateStr = now.getFullYear() + '.' + 
                          String(now.getMonth() + 1).padStart(2, '0') + '.' + 
                          String(now.getDate()).padStart(2, '0') + ' ' +
                          String(now.getHours()).padStart(2, '0') + ':' +
                          String(now.getMinutes()).padStart(2, '0');
            $('#certDate').text(dateStr);

            // =========================================
            // 點擊「保存圖片」按鈕的截圖下載邏輯
            // =========================================
            // =========================================
            $('#downloadBtn').click(function() {
                let $btn = $(this);
                let originalText = $btn.html();
                $btn.html('<span class="spinner-border spinner-border-sm"></span> 產生圖片中...');
                $btn.prop('disabled', true);

                html2canvas(document.querySelector("#certificateCard"), {
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: null 
                }).then(canvas => {
                    
                    // 1. 把畫布轉成真正的圖片網址 (Data URL)
                    let imgData = canvas.toDataURL("image/png");

                    // 2. 🌟 關鍵改變：不要觸發隱藏下載！🌟
                    // 把圖片網址塞給我們剛剛新增的 <img> 標籤
                    $('#finalGeneratedImg').attr('src', imgData);

                    // 3. 隱藏原本用 HTML 刻的卡片跟下載按鈕
                    $('#certificateCard').addClass('d-none');
                    $btn.addClass('d-none');
                    // 可以順便把那個「提示文字」也藏起來，讓畫面乾淨點
                    $('.text-danger.fw-bold').addClass('d-none'); 

                    // 4. 顯示結果區塊，讓使用者長按！
                    $('#resultContainer').removeClass('d-none');

                    // (如果需要，畫面可以自動捲動到圖片位置)
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                }).catch(err => {
                    console.error("截圖失敗：", err);
                    alert("產生圖片失敗，請確認圖片來源安全性。");
                    $btn.html(originalText);
                    $btn.prop('disabled', false);
                });
            });
        });
    </script>
</body>
</html>
